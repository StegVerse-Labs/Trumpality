name: manual-native-ingest-and-export
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: manual-native-ingest-${{ github.repository }}
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r core/requirements.txt

      - name: Initialize DB if needed
        run: |
          python - <<'PY'
          import os
          import sqlite3
          os.makedirs("data/processed", exist_ok=True)
          conn = sqlite3.connect("data/processed/records.sqlite")
          conn.executescript(open("core/schema.sql", encoding="utf-8").read())
          conn.commit()
          conn.close()
          print("DB initialized")
          PY

      - name: Ingest seeds
        run: |
          python core/ingest_pipeline/url_list_ingest.py \
            --subject "Donald J. Trump" \
            --topic_cluster general \
            --urls seeds/sources.urls.txt

      - name: Emit pending ledger candidates
        run: python core/exports/export_ledger_candidates.py

      - name: Commit native outputs and receipts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add data/processed data/receipts datasets/exports
          git commit -m "manual ingest: update records, exports, and receipts" || echo "no changes"
          git push
