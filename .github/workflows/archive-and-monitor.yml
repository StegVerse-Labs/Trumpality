name: archive-and-monitor
on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 2,5"  # Tue & Fri 08:00 UTC

permissions:
  contents: write

concurrency:
  group: archive-monitor-${{ github.repository }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r core/requirements.txt

      - name: Initialize database and archive columns
        run: |
          python - <<'PY'
          import os
          import sqlite3
          import sys

          db = "data/processed/records.sqlite"
          if not os.path.exists(db):
              print("No DB yet; run weekly-ingest first.")
              sys.exit(0)

          conn = sqlite3.connect(db)
          existing = {row[1] for row in conn.execute("PRAGMA table_info(records)")}
          additions = {
              "archive_wayback": "TEXT",
              "archive_local_path": "TEXT",
              "checksum_sha256": "TEXT",
              "last_verified_at": "TEXT",
              "last_status_code": "INTEGER",
              "link_ok": "INTEGER DEFAULT 1",
          }
          for name, declaration in additions.items():
              if name not in existing:
                  conn.execute(f"ALTER TABLE records ADD COLUMN {name} {declaration}")
          conn.commit()
          conn.close()
          PY

      - name: Archive source records
        run: python core/archival/archiver.py

      - name: Monitor link health
        run: python core/archival/monitor_links.py

      - name: Emit pending ledger candidates
        run: python core/exports/export_ledger_candidates.py

      - name: Generate commit and hash bound ledger manifest
        run: python core/exports/build_ledger_manifest.py

      - name: Validate manifest authority boundary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path("datasets/exports/executive-rhetoric-ledger/manifest.json")
          manifest = json.loads(path.read_text())
          assert manifest["producer_repository"] == "StegVerse-Labs/Trumpality"
          assert manifest["authority"]["may_promote"] is False
          assert manifest["authority"]["requires_ledger_review"] is True
          PY

      - name: Commit snapshots, exports, manifests, and receipts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add data/processed data/archive data/receipts datasets/exports
          git commit -m "archive+monitor: update snapshots, exports, manifest, health, and receipts" || echo "no changes"
          git push
