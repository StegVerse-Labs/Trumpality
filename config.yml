subject: "Donald J. Trump"

modes:
  biography: true
  rhetoric_action_ledger: true

topic_defaults:
  clusters:
    - sexual_misconduct
    - finance
    - documents
    - lawsuits
    - campaigns
    - federalism_conflict
    - conditional_funding
    - retaliation_language
    - immigration_enforcement
    - judicial_intervention

policies:
  require_reputable_source: true
  allow_secondary_if_cites_primary: true
  ban_memes: true
  require_verbatim_for_statements: true
  append_only_records: true

free_dom:
  enabled: true
  mode: involvement
  relation_fields: [entity, event, date, filing, source_url]

ledger:
  enabled: true
  record_types:
    - statement
    - action
    - link
  required_fields:
    statement:
      - id
      - date_time_utc
      - verbatim_quote
      - primary_source_url
    action:
      - id
      - date
      - primary_source_url
    link:
      - statement_id
      - action_id
      - relationship_type
